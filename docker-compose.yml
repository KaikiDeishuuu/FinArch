services:
  api:
    image: ghcr.io/kaikideishuuu/finarch:latest
    container_name: finarch-api
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FINARCH_DB=/data/finarch.db
      - FINARCH_ADDR=127.0.0.1:8080
      - GIN_MODE=release
    volumes:
      - finarch-data:/data
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--post-data={}", "--header=Content-Type:application/json", "http://localhost:8080/api/v1/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  finarch-data:
    driver: local
