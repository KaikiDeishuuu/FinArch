services:
  api:
    image: ghcr.io/kaikideishuuu/finarch:latest
    container_name: finarch-api
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FINARCH_DB=/data/finarch.db
      - FINARCH_ADDR=127.0.0.1:8080
      - GIN_MODE=release
    volumes:
      - finarch-data:/data
    network_mode: host
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--post-data={}", "--header=Content-Type:application/json", "http://localhost:8080/api/v1/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
    network_mode: host

volumes:
  finarch-data:
    driver: local
