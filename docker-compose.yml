services:
  api:
    image: ghcr.io/kaikideishuuu/finarch:latest
    container_name: finarch-api
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FINARCH_DB=/data/finarch.db
      - FINARCH_ADDR=127.0.0.1:8080
      - GIN_MODE=release
      # Cloudflare Turnstile CAPTCHA (leave empty to disable for local dev)
      # Get keys at https://dash.cloudflare.com/?to=/:account/turnstile
      - TURNSTILE_SECRET=${TURNSTILE_SECRET:-}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
    volumes:
      - finarch-data:/data
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --post-data='{\"email\":\"_\",\"password\":\"_\"}' --header='Content-Type:application/json' http://localhost:8080/api/v1/auth/login 2>&1; ret=$$?; [ $$ret -eq 0 ] || [ $$ret -eq 8 ]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  finarch-data:
    driver: local
