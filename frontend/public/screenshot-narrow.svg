  <text x="20" y="54" font-family="sans-serif" font-size="12" fill="#93c5fd">记账 · 报销 · 统计</text>

  <!-- Summary cards -->
  <!-- Income -->
  <rect x="12" y="80" width="118" height="70" rx="12" fill="#d1fae5"/>
