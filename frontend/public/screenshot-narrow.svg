      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <clipPath id="card1"><rect rx="12" ry="12" width="118" height="70"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#f0f2f5"/>

  <!-- Header -->
  <rect width="390" height="64" fill="url(#hdr)"/>
