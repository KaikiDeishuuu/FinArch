<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="FinArch">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f18"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
  </defs>
  <!-- Rounded background (rx proportional to favicon rx=13 on 64px → 104 on 512px) -->
  <rect width="512" height="512" rx="104" ry="104" fill="url(#bg)"/>
  <!-- 3 bars, scaled from favicon ×8, vertically centered at 256:
       content spans y=96..416, center=(96+416)/2=256 ✓ -->
  <rect x="64"  y="272" width="112" height="144" rx="24" fill="#2563eb"/>
  <rect x="200" y="192" width="112" height="224" rx="24" fill="#f97316"/>
  <rect x="336" y="96"  width="112" height="320" rx="24" fill="#22c55e"/>
</svg>
