<!-- Maskable icon: full-bleed background, content in center 80% safe zone -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="FinArch">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f18"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (no radius for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content scaled to center 80% safe zone (i.e. within ~205px radius from center=256,256) -->
  <!-- 3 bars bottom-aligned at y=391, content vertically centered at y=256 -->
  <!-- Blue bar (shortest) -->
  <rect x="112" y="263" width="72" height="128" rx="16" fill="#2563eb"/>
  <!-- Orange bar (medium) -->
  <rect x="220" y="199" width="72" height="192" rx="16" fill="#f97316"/>
  <!-- Green bar (tallest) -->
  <rect x="328" y="121" width="72" height="270" rx="16" fill="#22c55e"/>
</svg>
