<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA 基础 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- 视口 & 移动端优化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinArch" />

    <!-- 主题色 (Edge / Chrome 地址栏) -->
    <meta name="theme-color" content="#FAFAF9" />
    <meta name="msapplication-TileColor" content="#0d0b14" />

    <!-- SEO / 描述 -->
    <meta name="description" content="记账 · 报销 · 统计，轻量高效的多用户财务管理工具" />
    <meta name="application-name" content="FinArch" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap"
    />

    <!-- 禁止自动识别电话号码 -->
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS Apple Splash Screens -->
    <!-- iPhone 14 Pro / 15 Pro (393pt @3x = 1179×2556) -->
    <link rel="apple-touch-startup-image"
          href="/splash-1179x2556.png"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 / 13 / 12 (390pt @3x = 1170×2532) -->
    <link rel="apple-touch-startup-image"
          href="/splash-1170x2532.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 13 mini / 12 mini / X / XS (375pt @3x = 1125×2436) -->
    <link rel="apple-touch-startup-image"
          href="/splash-1125x2436.png"
          media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 Plus / 13 Pro Max / 12 Pro Max (428pt @3x = 1284×2778) -->
    <link rel="apple-touch-startup-image"
          href="/splash-1284x2778.png"
          media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone XR / 11 (414pt @2x = 828×1792) -->
    <link rel="apple-touch-startup-image"
          href="/splash-828x1792.png"
          media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />

    <title>FinArch</title>
    <!-- Detect language & theme before first paint -->
    <script>
      (function(){
        var lang = localStorage.getItem('finarch-lang') || navigator.language || 'zh';
        var isEn = lang.indexOf('en') === 0;
        document.documentElement.lang = isEn ? 'en' : 'zh-CN';
        window.__splashTagline = isEn ? 'Accounting · Reimbursement · Analytics' : '记账 · 报销 · 统计';
        // Dark-mode splash
        var theme = localStorage.getItem('finarch-theme') || 'system';
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        window.__splashDark = dark;
      })();
    </script>
  </head>
  <body>
    <!-- PWA splash screen: shown immediately, removed by React after mount -->
    <style>
      @keyframes splash-logo-in {
        0%   { transform:scale(0.88); }
        60%  { transform:scale(1.04); }
        100% { transform:scale(1); }
      }
      @keyframes splash-bar-rise {
        0%   { transform:scaleY(0); opacity:0; }
        60%  { transform:scaleY(1.08); opacity:1; }
        100% { transform:scaleY(1); opacity:1; }
      }
      @keyframes splash-text-in {
        0%   { opacity:0; transform:translateY(8px); }
        100% { opacity:1; transform:translateY(0); }
      }
      @keyframes splash-pulse {
        0%,100% { box-shadow:0 12px 40px rgba(13,11,20,0.35),0 2px 8px rgba(13,11,20,0.20); }
        50%     { box-shadow:0 16px 56px rgba(13,11,20,0.45),0 4px 12px rgba(13,11,20,0.28); }
      }
      @keyframes splash-dots {
        0%,80%,100% { opacity:0.3; transform:scale(0.85); }
        40%         { opacity:1;   transform:scale(1); }
      }
      #splash { transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1); }
      #splash.splash-fade-out { opacity:0; pointer-events:none; }
    </style>
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      display:flex;align-items:center;justify-content:center;
      background:#FAFAF9;
    ">
      <script>if(window.__splashDark)document.getElementById('splash').style.background='#0d0b14';</script>
      <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
        <!-- Logo card: violet-indigo gradient with entrance + pulse animation -->
        <div style="
          width:104px;height:104px;border-radius:26px;
          background:linear-gradient(145deg,#0d0b14 0%,#170f26 100%);
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 12px 40px rgba(13,11,20,0.35),0 2px 8px rgba(13,11,20,0.20);
          overflow:hidden;
          animation: splash-logo-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both,
                     splash-pulse 2.4s ease-in-out 0.8s infinite;
        ">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="80" height="80">
            <rect x="64"  y="272" width="112" height="144" rx="24" fill="#818cf8"
                  style="transform-origin:center bottom;animation:splash-bar-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.25s both"/>
            <rect x="200" y="192" width="112" height="224" rx="24" fill="#a78bfa"
                  style="transform-origin:center bottom;animation:splash-bar-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.40s both"/>
            <rect x="336" y="96"  width="112" height="320" rx="24" fill="#34d399"
                  style="transform-origin:center bottom;animation:splash-bar-rise 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.55s both"/>
          </svg>
        </div>
        <!-- Brand name with fade-slide in -->
        <span id="splash-brand" style="
          color:#0d0b14;font-family:'Saira','Noto Serif SC',sans-serif;
          font-size:22px;font-weight:700;letter-spacing:0.01em;
          animation:splash-text-in 0.5s ease-out 0.4s both;
        ">FinArch</span>
        <script>if(window.__splashDark)document.getElementById('splash-brand').style.color='#e5e7eb';</script>
        <!-- Tagline with staggered entrance -->
        <span id="splash-tagline" style="
          color:#6b7280;font-family:'Saira','Noto Serif SC',sans-serif;
          font-size:13px;
          animation:splash-text-in 0.5s ease-out 0.55s both;
        "></span>
        <script>document.getElementById('splash-tagline').textContent=window.__splashTagline||'记账 · 报销 · 统计';</script>
        <!-- Loading dots indicator -->
        <div style="display:flex;gap:6px;margin-top:4px">
          <div style="width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:splash-dots 1.4s ease-in-out 0.7s infinite"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:splash-dots 1.4s ease-in-out 0.9s infinite"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#a78bfa;animation:splash-dots 1.4s ease-in-out 1.1s infinite"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
