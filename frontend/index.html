<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA 基础 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- 视口 & 移动端优化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinArch" />

    <!-- 主题色 (Edge / Chrome 地址栏) -->
    <meta name="theme-color" content="#0d1b3e" />
    <meta name="msapplication-TileColor" content="#0d1b3e" />

    <!-- SEO / 描述 -->
    <meta name="description" content="记账 · 报销 · 统计，轻量高效的多用户财务管理工具" />
    <meta name="application-name" content="FinArch" />

    <!-- 禁止自动识别电话号码 -->
    <meta name="format-detection" content="telephone=no" />

    <title>FinArch</title>
  </head>
  <body>
    <!-- PWA splash screen: shown immediately, faded out by React after first render -->
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0b1f18 0%,#0d1b3e 100%);
      transition:opacity 0.4s ease;
    ">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <!-- Rounded icon matching app icon shape -->
        <div style="
          width:96px;height:96px;border-radius:22px;
          background:linear-gradient(135deg,#0b1f18 0%,#0d1b3e 100%);
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 8px 32px rgba(0,0,0,0.4);
          overflow:hidden;
        ">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="80" height="80">
            <rect width="512" height="512" rx="104" ry="104" fill="url(#sbg)"/>
            <defs>
              <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0b1f18"/>
                <stop offset="100%" stop-color="#0d1b3e"/>
              </linearGradient>
            </defs>
            <rect x="64"  y="272" width="112" height="144" rx="24" fill="#2563eb"/>
            <rect x="200" y="192" width="112" height="224" rx="24" fill="#f97316"/>
            <rect x="336" y="96"  width="112" height="320" rx="24" fill="#22c55e"/>
          </svg>
        </div>
        <span style="color:white;font-family:sans-serif;font-size:22px;font-weight:700;letter-spacing:0.04em">FinArch</span>
        <span style="color:#93c5fd;font-family:sans-serif;font-size:13px">记账 · 报销 · 统计</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
