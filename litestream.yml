# Litestream 实时备份配置
# 使用前需在 .env 中设置以下环境变量：
#   LITESTREAM_ACCESS_KEY_ID     Cloudflare R2 Access Key ID
#   LITESTREAM_SECRET_ACCESS_KEY Cloudflare R2 Secret Access Key
#   LITESTREAM_BUCKET            R2 存储桶名称
#   LITESTREAM_ENDPOINT          R2 端点，格式：https://<account_id>.r2.cloudflarestorage.com

dbs:
  - path: /data/finarch.db
    replicas:
      - name: r2
        type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: finarch
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        endpoint: ${LITESTREAM_ENDPOINT}
        region: auto
        # 每 60 秒生成一次 snapshot，保留 7 天内的快照
        snapshot-interval: 1h
        retention: 168h
